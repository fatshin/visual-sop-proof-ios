name: VisualSOPProof
options:
  bundleIdPrefix: com.visualsopproof
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.6"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    GENERATE_INFOPLIST_FILE: YES
targets:
  VisualSOPProof:
    type: application
    platform: iOS
    sources:
      - path: VisualSOPProof
        excludes:
          - Resources
      - path: VisualSOPProof/Resources
        buildPhase: resources
        excludes:
          - sample_frames
          - sample_slides
      - path: VisualSOPProof/Resources/sample_frames
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.visualsopproof.app
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        INFOPLIST_KEY_CFBundleDisplayName: Visual SOP Proof
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Live analysis connects only to the Visual SOP Proof proxy running on this Mac.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Visual SOP Proof"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: VisualSOPProof/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
  VisualSOPProofTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VisualSOPProofTests
    dependencies:
      - target: VisualSOPProof
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.visualsopproof.tests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  VisualSOPProofUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: VisualSOPProofUITests
    dependencies:
      - target: VisualSOPProof
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.visualsopproof.uitests
        GENERATE_INFOPLIST_FILE: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
schemes:
  VisualSOPProof:
    build:
      targets:
        VisualSOPProof: all
        VisualSOPProofTests: [test]
        VisualSOPProofUITests: [test]
    test:
      targets:
        - VisualSOPProofTests
        - VisualSOPProofUITests
